name: 交易简报推送

on:
  schedule:
    # 早盘 北京时间 9:30 → UTC 01:30（周一至周五）
    - cron: "30 1 * * 1-5"
    # 晚盘 北京时间 15:30 → UTC 07:30（周一至周五）
    - cron: "30 7 * * 1-5"
  workflow_dispatch:
    inputs:
      session:
        description: "推送时段"
        required: true
        type: choice
        options:
          - morning
          - evening

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version-file: pyproject.toml

      - name: Install dependencies
        run: uv sync

      - name: Set config files from secrets
        run: |
          mkdir -p trade_digest/config
          echo "${{ secrets.SETTINGS_YAML }}" > trade_digest/config/settings.yaml
          echo "${{ secrets.HOLDINGS_YAML }}" > trade_digest/config/holdings.yaml

      - name: Determine session
        id: session
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "session=${{ github.event.inputs.session }}" >> $GITHUB_OUTPUT
          else
            # 根据 UTC 时间推断：01:xx → morning，07:xx → evening
            HOUR=$(date -u +%H)
            if [ "$HOUR" -lt 5 ]; then
              echo "session=morning" >> $GITHUB_OUTPUT
            else
              echo "session=evening" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run trade digest
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_SENDER: ${{ secrets.SMTP_SENDER }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: uv run python -m trade_digest.main --session ${{ steps.session.outputs.session }}
